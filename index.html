<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>汉阳铁厂交互知识库</title>
  <style>
    :root {
      --card: #fffcf5;
      --ring: #a67c52;
      --input: #dbd0ba;
      --muted-panel: #ece5d8;
      --accent: #d4c8aa;
      --border: #dbd0ba;
      --radius: 0.25rem;
      --chart-1: #a67c52;
      --chart-2: #8d6e4c;
      --chart-3: #735a3a;
      --chart-4: #b3906f;
      --chart-5: #c0a080;
      --popover: #fffcf5;
      --primary: #a67c52;
      --sidebar: #ece5d8;
      --font-mono: "IBM Plex Mono", monospace;
      --font-sans: "Libre Baskerville", "Noto Serif SC", "Songti SC", SimSun, serif;
      --secondary: #e2d8c3;
      --background: #f5f1e6;
      --font-serif: "Lora", "Noto Serif SC", "Songti SC", SimSun, serif;
      --foreground: #4a3f35;
      --destructive: #b54a35;
      --shadow-blur: 5px;
      --shadow-color: 28 13% 20%;
      --shadow-spread: 0px;
      --shadow-opacity: 0.12;
      --card-foreground: #4a3f35;
      --shadow-offset-x: 2px;
      --shadow-offset-y: 3px;
      --muted-foreground: #7d6b56;
      --accent-foreground: #4a3f35;
      --primary-foreground: #ffffff;

      --night: #2d2621;
      --ink: var(--foreground);
      --muted: var(--muted-foreground);
      --paper: var(--background);
      --surface: var(--card);
      --line: var(--border);
      --red: #8c3d2f;
      --ember: #b54a35;
      --gold: var(--primary);
      --teal: #2b7470;
      --teal-soft: #e7f0e9;
      --smoke: #d8d1c4;
      --steel: #596f70;
      --purple: #6f6178;
      --shadow: var(--shadow-offset-x) var(--shadow-offset-y) var(--shadow-blur) var(--shadow-spread) hsl(var(--shadow-color) / var(--shadow-opacity));
    }

    .dark {
      --card: #3a322c;
      --ring: #c0a080;
      --input: #4a4039;
      --muted-panel: #312b26;
      --accent: #59493e;
      --border: #4a4039;
      --chart-1: #c0a080;
      --chart-2: #b3906f;
      --chart-3: #a67c52;
      --chart-4: #8d6e4c;
      --chart-5: #735a3a;
      --popover: #3a322c;
      --primary: #c0a080;
      --sidebar: #2d2621;
      --secondary: #4a4039;
      --background: #2d2621;
      --foreground: #ece5d8;
      --destructive: #b54a35;
      --card-foreground: #ece5d8;
      --muted-foreground: #c5bcac;
      --accent-foreground: #ece5d8;
      --primary-foreground: #2d2621;

      --night: #201a16;
      --ink: var(--foreground);
      --muted: var(--muted-foreground);
      --paper: var(--background);
      --surface: var(--card);
      --line: var(--border);
      --gold: var(--primary);
      --teal-soft: #253a37;
      --shadow-opacity: 0.28;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 14%, rgba(181, 74, 53, 0.14), transparent 28%),
        radial-gradient(circle at 82% 8%, rgba(166, 124, 82, 0.18), transparent 24%),
        linear-gradient(180deg, #2d2621 0%, #3a322c 42%, #e9dfcc 42%, var(--background) 100%);
      font-family: var(--font-sans);
      line-height: 1.6;
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
    }

    .stage {
      position: relative;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      padding: 26px 0 24px;
      color: #fff;
      isolation: isolate;
      overflow: hidden;
    }

    .stage > :not(.wave-field) {
      position: relative;
      z-index: 1;
    }

    .wave-field {
      position: absolute;
      top: -190px;
      right: -90px;
      z-index: 0;
      width: min(1080px, 88vw);
      height: 1080px;
      overflow: hidden;
      opacity: 0.34;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .wave-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .stage-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 460px);
      gap: 18px;
      align-items: end;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 14px;
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: 999px;
      color: #f6ead4;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
      font-size: 13px;
      letter-spacing: 0.02em;
      box-shadow: 0 0 18px rgba(200, 160, 100, 0.1), inset 0 1px 0 rgba(255,255,255,0.1);
      backdrop-filter: blur(6px);
    }

    html {
      scroll-behavior: smooth;
    }

    h1 {
      max-width: 900px;
      margin: 12px 0 8px;
      font-size: 46px;
      line-height: 1.12;
      letter-spacing: 0;
      font-weight: 800;
      background: linear-gradient(135deg, #ffe0b8 0%, #f5c882 28%, #e8a858 52%, #f5d098 76%, #ffe0b8 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer-title 4s ease-in-out infinite;
    }

    @keyframes shimmer-title {
      0%, 100% { background-position: 0% center; }
      50% { background-position: 200% center; }
    }

    .intro {
      max-width: 820px;
      margin: 0;
      color: rgba(255, 255, 255, 0.82);
      font-size: 16px;
    }

    .search-box {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid rgba(219, 208, 186, 0.38);
      border-radius: var(--radius);
      background: rgba(255, 252, 245, 0.16);
      backdrop-filter: blur(12px);
    }

    .search-input {
      width: 100%;
      min-height: 46px;
      padding: 0 14px;
      border: 1px solid rgba(219, 208, 186, 0.42);
      border-radius: 8px;
      color: #fffcf5;
      background: rgba(30, 26, 22, 0.62);
      outline: none;
      font-size: 15px;
      letter-spacing: 0.02em;
      transition: border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
      backdrop-filter: blur(8px);
    }

    .search-input::placeholder {
      color: rgba(255, 252, 245, 0.52);
      font-style: italic;
    }

    .search-input:focus {
      border-color: rgba(220, 180, 120, 0.9);
      background: rgba(20, 17, 14, 0.72);
      box-shadow: 0 0 0 4px rgba(166, 124, 82, 0.18), 0 0 28px rgba(200, 150, 80, 0.1);
    }

    .search-results {
      display: none;
      gap: 8px;
      max-height: 190px;
      overflow: auto;
    }

    .search-results.is-open {
      display: grid;
    }

    .result-button {
      min-height: 42px;
      padding: 10px 14px 10px 18px;
      border: 1px solid rgba(219, 208, 186, 0.22);
      border-radius: 8px;
      background: rgba(255, 252, 245, 0.1);
      color: #fffcf5;
      text-align: left;
      position: relative;
      transition: background 0.2s ease, border-color 0.2s ease, padding-left 0.2s ease;
      backdrop-filter: blur(6px);
    }

    .result-button::before {
      content: "";
      position: absolute;
      left: 0;
      top: 12px;
      bottom: 12px;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: rgba(200, 160, 100, 0);
      transition: background 0.2s ease;
    }

    .result-button:hover {
      background: rgba(255, 252, 245, 0.2);
      border-color: rgba(200, 160, 100, 0.55);
      padding-left: 24px;
    }

    .result-button:hover::before {
      background: rgba(220, 180, 120, 0.7);
    }

    .result-button span {
      display: block;
      color: rgba(255, 252, 245, 0.56);
      font-size: 12px;
      margin-top: 2px;
    }

    .map-wrap {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 284px;
      gap: 18px;
      min-height: 560px;
      align-items: stretch;
    }

    .factory-map {
      position: relative;
      min-height: 560px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(10, 14, 15, 0.48), rgba(10, 14, 15, 0.86)),
        url("assets/hero-factory.jpg") center / cover no-repeat;
      box-shadow: var(--shadow);
      isolation: isolate;
      background-color: #101719;
    }

    .factory-map::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(13, 18, 19, 0.92), rgba(13, 18, 19, 0.38) 48%, rgba(13, 18, 19, 0.76)),
        radial-gradient(circle at 80% 66%, rgba(225, 107, 51, 0.28), transparent 25%),
        radial-gradient(circle at 50% 25%, rgba(75, 155, 154, 0.16), transparent 28%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 96px),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.026) 0 1px, transparent 1px 82px);
      z-index: -1;
    }

    .factory-map::after {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.22);
    }

    .smoke {
      position: absolute;
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(220, 226, 223, 0.55), rgba(220, 226, 223, 0.04) 70%);
      filter: blur(3px);
      opacity: 0.62;
      animation: smoke-rise 8s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    .smoke.s1 { left: 31%; bottom: 51%; animation-delay: -1s; }
    .smoke.s2 { left: 52%; bottom: 56%; width: 96px; height: 96px; animation-delay: -3.5s; }
    .smoke.s3 { left: 73%; bottom: 53%; width: 68px; height: 68px; animation-delay: -5s; }

    @keyframes smoke-rise {
      0% { transform: translateY(22px) scale(0.74); opacity: 0; }
      22% { opacity: 0.55; }
      100% { transform: translateY(-92px) translateX(26px) scale(1.45); opacity: 0; }
    }

    .furnace-glow {
      position: absolute;
      right: 17%;
      bottom: 18%;
      width: 180px;
      height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 125, 54, 0.52), rgba(255, 125, 54, 0.12) 45%, transparent 72%);
      animation: glow 2.6s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes glow {
      0%, 100% { opacity: 0.45; transform: scale(0.96); }
      50% { opacity: 0.86; transform: scale(1.06); }
    }

    .pipe-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      filter: drop-shadow(0 0 10px rgba(245, 207, 143, 0.18));
      z-index: 1;
    }

    .pipe-svg path {
      fill: none;
      stroke: rgba(245, 207, 143, 0.68);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 14 12;
      animation: dash 7s linear infinite;
    }

    .pipe-svg .track-bed {
      stroke: rgba(235, 242, 239, 0.16);
      stroke-width: 12;
      stroke-dasharray: none;
      animation: none;
      filter: none;
    }

    .pipe-svg .track-bed.hot {
      stroke: rgba(246, 176, 84, 0.18);
      stroke-width: 14;
    }

    .pipe-svg .track-bed.cool {
      stroke: rgba(210, 225, 226, 0.12);
      stroke-width: 10;
    }

    .pipe-svg .context-track {
      stroke: rgba(255, 238, 212, 0.46);
      stroke-width: 3;
      stroke-dasharray: 7 12;
    }

    .pipe-svg .process-track {
      stroke: rgba(250, 208, 137, 0.88);
      stroke-width: 5;
      stroke-dasharray: 18 10;
    }

    .pipe-svg .decline-track {
      stroke: rgba(208, 219, 221, 0.42);
      stroke-width: 3;
      stroke-dasharray: 10 12;
    }

    @keyframes dash {
      to { stroke-dashoffset: -120; }
    }

    .map-node {
      position: absolute;
      width: 170px;
      min-height: 106px;
      padding: 13px 14px 13px 46px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(255,253,247,0.96), rgba(255,250,242,0.9));
      color: var(--ink);
      text-align: left;
      box-shadow:
        0 18px 34px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.8),
        inset 0 -1px 0 rgba(0,0,0,0.04);
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.22s ease, border-color 0.22s ease;
      backdrop-filter: blur(8px);
      z-index: 3;
      cursor: pointer;
    }

    .map-node::before {
      content: attr(data-step);
      position: absolute;
      left: 11px;
      top: 14px;
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--red), var(--gold));
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 4px 14px rgba(166, 124, 82, 0.32), 0 0 0 3px rgba(255,255,255,0.5);
    }

    .map-node::after {
      content: "";
      position: absolute;
      inset: 6px auto 6px 0;
      width: 4px;
      border-radius: 0 4px 4px 0;
      background: linear-gradient(180deg, rgba(172, 82, 48, 0.9), rgba(214, 172, 92, 0.8));
      transition: width 0.22s ease;
    }

    .map-node:hover {
      transform: translateY(-5px) scale(1.03);
      border-color: rgba(255, 210, 130, 0.95);
      box-shadow:
        0 24px 44px rgba(0, 0, 0, 0.32),
        0 0 24px rgba(245, 180, 100, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      animation: none;
    }

    .map-node:hover::after {
      width: 6px;
    }

    .map-node:active {
      transform: translateY(-2px) scale(0.98);
      transition: transform 0.08s ease;
    }

    .map-node .kicker {
      display: block;
      color: var(--gold);
      font-size: 12px;
      line-height: 1.2;
    }

    .map-node b {
      display: block;
      margin-top: 4px;
      font-size: 15px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .map-node small {
      display: block;
      margin-top: 4px;
      color: #516064;
      font-size: 12px;
      line-height: 1.35;
    }

    .map-node.context { background: linear-gradient(135deg, rgba(255,245,240,0.97), rgba(255,240,230,0.92)); }
    .map-node.process { background: linear-gradient(135deg, rgba(241,253,249,0.97), rgba(232,250,244,0.92)); }
    .map-node.output { background: linear-gradient(135deg, rgba(244,248,251,0.97), rgba(236,244,250,0.92)); }

    .map-node.process::after {
      background: linear-gradient(180deg, rgba(33, 137, 135, 0.92), rgba(68, 105, 117, 0.8));
    }

    .map-node.output::after {
      background: linear-gradient(180deg, rgba(219, 150, 67, 0.92), rgba(158, 69, 45, 0.8));
    }

    .map-node.process::before {
      background: linear-gradient(135deg, var(--teal), var(--steel));
      box-shadow: 0 4px 14px rgba(43, 116, 112, 0.32), 0 0 0 3px rgba(255,255,255,0.5);
    }

    .map-node.output::before {
      background: linear-gradient(135deg, var(--gold), var(--ember));
      box-shadow: 0 4px 14px rgba(180, 120, 60, 0.32), 0 0 0 3px rgba(255,255,255,0.5);
    }

    .map-lane {
      position: absolute;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 4px 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      color: rgba(255, 246, 231, 0.94);
      background: rgba(10, 16, 17, 0.54);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
      z-index: 2;
    }

    .map-lane::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ffd18a;
      box-shadow: 0 0 14px rgba(255, 209, 138, 0.7);
      animation: lane-dot 2s ease-in-out infinite;
    }

    @keyframes lane-dot {
      0%, 100% { box-shadow: 0 0 10px rgba(255, 209, 138, 0.5); }
      50% { box-shadow: 0 0 20px rgba(255, 209, 138, 0.9); }
    }

    .guide-panel {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      color: var(--ink);
    }

    .guide-card {
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: var(--radius);
      background: rgba(255, 253, 247, 0.94);
      box-shadow: var(--shadow);
    }

    .guide-card h2,
    .guide-card h3 {
      margin: 0;
      letter-spacing: 0;
    }

    .guide-card h2 {
      font-size: 18px;
    }

    .guide-card p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .figure-list {
      display: grid;
      gap: 10px;
    }

    .figure-button {
      position: relative;
      min-height: 136px;
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      padding: 14px;
      border: 1px solid rgba(180, 160, 130, 0.28);
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(255,253,247,0.96), rgba(252,247,237,0.9));
      color: var(--ink);
      text-align: left;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(74,63,53,0.06);
      transition: border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
    }

    .figure-button::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 80% 20%, rgba(200,160,100,0.06), transparent 60%);
      pointer-events: none;
      transition: opacity 0.22s ease;
      opacity: 0;
    }

    .figure-button:hover {
      border-color: rgba(200, 160, 100, 0.55);
      box-shadow: 0 14px 32px rgba(30,39,41,0.1), 0 0 0 1px rgba(166,124,82,0.12);
      background: linear-gradient(135deg, rgba(255,253,247,1), rgba(254,249,240,0.96));
    }

    .figure-button:hover::after {
      opacity: 1;
    }

    .figure-button:hover .person-avatar {
      transform: translateY(-6px) rotate(-3deg);
    }

    .person-avatar {
      position: relative;
      width: 82px;
      height: 108px;
      display: block;
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: guide-float 4s ease-in-out infinite;
    }

    .portrait-frame {
      position: absolute;
      left: 9px;
      top: 0;
      width: 64px;
      height: 64px;
      overflow: hidden;
      border: 3px solid rgba(255, 253, 247, 0.95);
      border-radius: 50%;
      background: #e8e2d5;
      box-shadow: 0 10px 24px rgba(30, 39, 41, 0.22), 0 0 0 4px rgba(180,150,110,0.12);
      z-index: 2;
      transition: box-shadow 0.22s ease;
    }

    .figure-button:hover .portrait-frame {
      box-shadow: 0 14px 28px rgba(30, 39, 41, 0.28), 0 0 0 6px rgba(200,160,100,0.18);
    }

    .portrait-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .robe {
      position: absolute;
      left: 5px;
      bottom: 2px;
      width: 72px;
      height: 58px;
      border-radius: 26px 26px 10px 10px;
      background:
        radial-gradient(circle at 50% 12%, rgba(255, 255, 255, 0.48), transparent 23%),
        linear-gradient(135deg, var(--red), var(--gold));
      box-shadow: inset 0 8px 20px rgba(255, 255, 255, 0.2), 0 14px 22px rgba(141, 110, 76, 0.2);
    }

    .robe::before,
    .robe::after {
      content: "";
      position: absolute;
      top: 18px;
      width: 24px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 253, 247, 0.46);
    }

    .robe::before { left: -8px; transform: rotate(-24deg); }
    .robe::after { right: -8px; transform: rotate(24deg); }

    .figure-button:nth-child(2) .person-avatar { animation-delay: -1.2s; }
    .figure-button:nth-child(2) .robe {
      background:
        radial-gradient(circle at 50% 12%, rgba(255, 255, 255, 0.48), transparent 23%),
        linear-gradient(135deg, var(--teal), var(--steel));
      box-shadow: inset 0 8px 20px rgba(255, 255, 255, 0.2), 0 14px 22px rgba(43, 116, 112, 0.2);
    }

    .figure-button:nth-child(3) .person-avatar { animation-delay: -2.4s; }
    .figure-button:nth-child(3) .robe {
      background:
        radial-gradient(circle at 50% 12%, rgba(255, 255, 255, 0.48), transparent 23%),
        linear-gradient(135deg, var(--purple), var(--steel));
      box-shadow: inset 0 8px 20px rgba(255, 255, 255, 0.2), 0 14px 22px rgba(89, 111, 112, 0.2);
    }

    @keyframes guide-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .figure-button strong {
      display: block;
      line-height: 1.2;
      font-size: 18px;
      letter-spacing: 0.02em;
    }

    .figure-button > span > span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .story-rail {
      display: grid;
      grid-template-columns: 210px repeat(3, minmax(0, 1fr));
      gap: 12px;
      align-items: stretch;
      padding: 14px;
      border: 1px solid rgba(200, 180, 150, 0.5);
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(255,252,245,0.98), rgba(250,245,235,0.94));
      color: var(--ink);
      box-shadow: 0 8px 28px rgba(74,63,53,0.08);
    }

    .story-heading {
      display: grid;
      align-content: center;
      grid-row: span 2;
      padding: 16px;
      border-radius: 8px;
      color: #fff;
      background:
        linear-gradient(145deg, rgba(141,110,76,0.96), rgba(89,111,112,0.92)),
        var(--night);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }

    .story-heading::after {
      content: "";
      position: absolute;
      top: -30px;
      right: -30px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
      pointer-events: none;
    }

    .story-heading span {
      color: rgba(255, 255, 255, 0.78);
      font-size: 13px;
      letter-spacing: 0.04em;
    }

    .story-heading strong {
      display: block;
      margin-top: 4px;
      font-size: 20px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .story-button {
      position: relative;
      min-height: 130px;
      padding: 14px 14px 14px 18px;
      border: 1px solid rgba(180, 160, 130, 0.25);
      border-radius: 8px;
      color: var(--ink);
      background: linear-gradient(135deg, rgba(255,253,247,0.96), rgba(252,248,240,0.9));
      text-align: left;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(74,63,53,0.05);
      overflow: hidden;
      transition: border-color 0.22s ease, background 0.22s ease, box-shadow 0.22s ease;
    }

    .story-button::before {
      content: "";
      position: absolute;
      left: 0;
      top: 14px;
      bottom: 14px;
      width: 4px;
      border-radius: 0 4px 4px 0;
      background: linear-gradient(180deg, var(--red), var(--gold));
      transition: width 0.22s ease, top 0.22s ease, bottom 0.22s ease;
    }

    .story-button::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 70% 20%, rgba(200,160,100,0.05), transparent 55%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    .story-button:hover {
      border-color: rgba(166, 124, 82, 0.5);
      background: linear-gradient(135deg, rgba(255,250,240,1), rgba(252,244,228,0.96));
      box-shadow: 0 14px 30px rgba(74,63,53,0.1), 0 0 0 1px rgba(166,124,82,0.08);
    }

    .story-button:hover::before {
      width: 6px;
      top: 10px;
      bottom: 10px;
    }

    .story-button:hover::after {
      opacity: 1;
    }

    .story-button:active {
      transform: scale(0.98);
    }

    .story-button b {
      display: block;
      background: linear-gradient(135deg, #8c3d2f, #a0522d);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 30px;
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: -0.01em;
    }

    .story-button strong {
      display: block;
      margin-top: 6px;
      font-size: 16px;
      line-height: 1.25;
      letter-spacing: 0.01em;
      color: #3a3028;
    }

    .story-button > span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .evidence-dock {
      padding: 18px 0 30px;
      color: var(--ink);
    }

    .dock-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .dock-head h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }

    .dock-head p {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .asset-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
    }

    .asset-button {
      padding: 0;
      border: 0;
      background: transparent;
      text-align: left;
      color: inherit;
      cursor: pointer;
    }

    .asset-button .img-wrap {
      position: relative;
      display: block;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid rgba(180, 160, 130, 0.3);
      background: var(--surface);
      box-shadow: 0 4px 14px rgba(74,63,53,0.06);
      transition: border-color 0.22s ease, box-shadow 0.22s ease;
    }

    .asset-button img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      transition: transform 0.4s ease, filter 0.4s ease;
    }

    .asset-button .img-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(30, 22, 16, 0);
      transition: background 0.28s ease;
      pointer-events: none;
    }

    .asset-button .img-overlay::after {
      content: "查看大图";
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 6px 16px;
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 999px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.28s ease, transform 0.28s ease;
    }

    .asset-button:hover .img-wrap {
      border-color: rgba(200, 160, 100, 0.5);
      box-shadow: 0 12px 28px rgba(74,63,53,0.14), 0 0 0 2px rgba(166,124,82,0.12);
    }

    .asset-button:hover img {
      transform: scale(1.06);
      filter: brightness(0.7);
    }

    .asset-button:hover .img-overlay {
      background: rgba(30, 22, 16, 0.15);
    }

    .asset-button:hover .img-overlay::after {
      opacity: 1;
      transform: translateY(0);
    }

    .asset-button > span {
      display: block;
      margin-top: 8px;
      color: var(--foreground);
      font-size: 13px;
      line-height: 1.3;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 18%, rgba(181, 74, 53, 0.22), transparent 28%),
        rgba(45, 38, 33, 0.78);
    }

    .modal.is-open {
      display: flex;
    }

    .modal-panel {
      width: min(1020px, 100%);
      max-height: calc(100vh - 48px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
      border: 1px solid rgba(219, 208, 186, 0.68);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      box-shadow: var(--shadow);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(90deg, rgba(181, 74, 53, 0.12), rgba(43, 116, 112, 0.08)),
        #f8efe0;
    }

    .modal-title {
      display: grid;
      gap: 3px;
    }

    .modal-title h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .modal-title span {
      color: var(--muted);
      font-size: 13px;
    }

    .close-button {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(180, 160, 130, 0.35);
      border-radius: 50%;
      background: var(--surface);
      color: var(--ink);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      transition: all 0.22s ease;
    }

    .close-button:hover {
      border-color: rgba(180, 74, 53, 0.5);
      background: #fdf5f2;
      color: var(--red);
      transform: rotate(90deg);
      box-shadow: 0 4px 14px rgba(180,74,53,0.12);
    }

    .modal-body {
      overflow: auto;
      padding: 18px;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
      gap: 18px;
      align-items: start;
    }

    .article-text {
      display: grid;
      gap: 14px;
    }

    .article-text p {
      margin: 0;
      color: var(--foreground);
    }

    .article-text h3 {
      margin: 8px 0 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .fact-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .fact-list li {
      padding: 9px 10px;
      border-left: 3px solid var(--teal);
      border-radius: 0 6px 6px 0;
      background: #edf3ed;
      color: var(--foreground);
    }

    .detail-tabs {
      display: grid;
      gap: 10px;
      margin-top: 4px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .tab-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tab-button {
      min-height: 32px;
      padding: 6px 14px;
      border: 1px solid rgba(180, 160, 130, 0.3);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .tab-button:hover {
      border-color: rgba(166, 124, 82, 0.45);
      color: var(--foreground);
      background: #faf3e7;
    }

    .tab-button.is-active {
      border-color: rgba(166, 124, 82, 0.8);
      background: linear-gradient(135deg, var(--primary), #b89068);
      color: #fff;
      box-shadow: 0 4px 14px rgba(166, 124, 82, 0.28);
      font-weight: 700;
    }

    .tab-panel {
      display: none;
      gap: 9px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 252, 245, 0.78);
    }

    .tab-panel.is-active {
      display: grid;
    }

    .tab-panel h3 {
      margin: 0;
      color: var(--foreground);
      font-size: 17px;
      line-height: 1.3;
    }

    .detail-list {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .detail-list li {
      position: relative;
      padding-left: 16px;
      color: var(--foreground);
      font-size: 14px;
      line-height: 1.55;
    }

    .detail-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.78em;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
    }

    .detail-note {
      margin: 0;
      padding: 8px 10px;
      border-left: 3px solid var(--gold);
      border-radius: 0 6px 6px 0;
      background: var(--secondary);
      color: var(--muted);
      font-size: 13px;
    }

    .side-panel {
      display: grid;
      gap: 12px;
    }

    .mini-card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .mini-card h3 {
      margin: 0 0 8px;
      font-size: 15px;
      letter-spacing: 0;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--teal-soft);
      color: #365551;
      font-size: 12px;
    }

    .related-button {
      display: block;
      width: 100%;
      min-height: 38px;
      margin-top: 6px;
      padding: 9px 28px 9px 12px;
      border: 1px solid rgba(180, 160, 130, 0.28);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(255,253,247,0.9), rgba(250,245,237,0.86));
      color: var(--ink);
      text-align: left;
      font-size: 14px;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }

    .related-button::after {
      content: "→";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .related-button:hover {
      border-color: rgba(166, 124, 82, 0.5);
      background: #faf3e7;
      padding-left: 16px;
      box-shadow: 0 4px 14px rgba(74,63,53,0.06);
    }

    .related-button:hover::after {
      transform: translate(4px, -50%);
      color: #8c3d2f;
    }

    .modal-image {
      width: 100%;
      height: auto;
      display: block;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .caption {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .empty {
      color: rgba(255, 255, 255, 0.68);
      font-size: 13px;
    }

    @media (max-width: 1100px) {
      .stage-head,
      .map-wrap {
        grid-template-columns: 1fr;
      }

      .guide-panel {
        grid-template-columns: 1fr;
      }

      .figure-list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .asset-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    /* ── Scroll reveal ── */
    .reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.66s cubic-bezier(0.22, 0.61, 0.36, 1), transform 0.66s cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal-delay-1 { transition-delay: 0.08s; }
    .reveal-delay-2 { transition-delay: 0.16s; }
    .reveal-delay-3 { transition-delay: 0.24s; }
    .reveal-delay-4 { transition-delay: 0.32s; }
    .reveal-delay-5 { transition-delay: 0.40s; }

    /* ── 3D tilt ── */
    .tilt-card {
      perspective: 800px;
    }

    .tilt-card > * {
      transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
      transform-style: preserve-3d;
    }

    /* ── Glow pulse ── */
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 8px 28px rgba(74,63,53,0.08), 0 0 8px rgba(200, 160, 100, 0.08); }
      50% { box-shadow: 0 8px 28px rgba(74,63,53,0.08), 0 0 22px rgba(200, 150, 80, 0.2), 0 0 44px rgba(200, 150, 80, 0.06); }
    }

    .story-rail {
      animation: glow-pulse 4s ease-in-out infinite;
    }

    @keyframes node-pulse {
      0%, 100% { box-shadow: 0 18px 34px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.8), inset 0 -1px 0 rgba(0,0,0,0.04), 0 0 0 0 rgba(255, 180, 100, 0.28); }
      50% { box-shadow: 0 18px 34px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.8), inset 0 -1px 0 rgba(0,0,0,0.04), 0 0 0 10px rgba(255, 180, 100, 0); }
    }

    .map-node {
      animation: node-pulse 3.5s ease-in-out infinite;
    }

    .map-node:nth-child(odd) { animation-delay: -1.75s; }

    /* ── Spark canvas ── */
    .spark-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Modal animation ── */
    .modal {
      transition: opacity 0.28s ease;
      opacity: 0;
      pointer-events: none;
    }

    .modal.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal.is-open .modal-panel {
      animation: modal-pop 0.38s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes modal-pop {
      0% { transform: scale(0.92) translateY(24px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    /* ── Guide card ornament ── */
    .guide-card {
      position: relative;
      overflow: hidden;
    }

    .guide-card::after {
      content: "";
      position: absolute;
      top: -40px;
      right: -40px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(166, 124, 82, 0.06), transparent 70%);
      pointer-events: none;
    }

    /* ── Cursor glow on map ── */
    .cursor-glow {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245, 200, 130, 0.2), rgba(245, 150, 80, 0.06) 40%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      transform: translate(-50%, -50%);
      transition: opacity 0.4s ease;
      opacity: 0;
    }

    .factory-map:hover .cursor-glow {
      opacity: 1;
    }

    @media (max-width: 760px) {
      .app-shell {
        width: calc(100% - 20px);
      }

      .stage {
        min-height: auto;
        padding-top: 18px;
      }

      .wave-field {
        top: -120px;
        right: -210px;
        width: 760px;
        height: 760px;
        opacity: 0.28;
      }

      h1 {
        font-size: 34px;
      }

      .factory-map {
        min-height: auto;
        display: grid;
        gap: 10px;
        padding: 12px;
      }

      .pipe-svg,
      .smoke,
      .furnace-glow,
      .map-lane {
        display: none;
      }

      .map-node {
        position: static;
        width: 100%;
      }

      .story-rail,
      .figure-list,
      .asset-grid,
      .modal-grid {
        grid-template-columns: 1fr;
      }

      .story-heading {
        grid-row: auto;
      }

      .modal {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell stage">
    <div class="wave-field" aria-hidden="true">
      <canvas id="waveCanvas" class="wave-canvas"></canvas>
    </div>
    <section class="stage-head">
      <div>
        <span class="eyebrow">不是翻书目录，是一张可探索的汉阳铁厂知识图谱</span>
        <h1>汉阳铁厂交互知识库</h1>
        <p class="intro">点击厂区里的节点、人物或历史年份，会弹出完整内容。页面把《汉冶萍公司志》中已抽取和校读的核心材料改写成网页化知识模块，不再把页码当作主入口。</p>
      </div>
      <div class="search-box">
        <input id="searchInput" class="search-input" type="search" placeholder="搜索：焦炭、平炉、钢轨、张之洞、大冶、萍乡..." />
        <div id="searchResults" class="search-results"></div>
      </div>
    </section>

    <section class="map-wrap">
      <div class="factory-map" aria-label="汉阳铁厂交互知识地图">
        <span class="smoke s1"></span>
        <span class="smoke s2"></span>
        <span class="smoke s3"></span>
        <span class="furnace-glow"></span>
        <canvas id="sparkCanvas" class="spark-canvas"></canvas>
        <span class="cursor-glow" id="cursorGlow"></span>
        <span class="map-lane" style="left:4%; top:5%;">历史与空间基础</span>
        <span class="map-lane" style="left:42%; top:5%;">生产主流程</span>
        <span class="map-lane" style="left:58%; top:56%;">产品与命运</span>
        <svg class="pipe-svg" viewBox="0 0 1000 560" preserveAspectRatio="none" aria-hidden="true">
          <defs>
            <marker id="flowArrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
              <path d="M0,0 L0,6 L8,3 z" fill="rgba(245,207,143,0.9)"></path>
            </marker>
            <marker id="softArrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
              <path d="M0,0 L0,6 L8,3 z" fill="rgba(255,238,212,0.58)"></path>
            </marker>
          </defs>
          <path class="track-bed" d="M132 130 C246 130, 288 130, 394 130"></path>
          <path class="track-bed" d="M394 130 C454 130, 500 130, 560 130"></path>
          <path class="track-bed hot" d="M560 130 C662 130, 720 130, 812 130"></path>
          <path class="track-bed hot" d="M812 192 C812 248, 812 282, 812 336"></path>
          <path class="track-bed hot" d="M770 392 C700 422, 630 424, 540 392"></path>
          <path class="track-bed hot" d="M612 392 C688 392, 742 408, 812 438"></path>
          <path class="track-bed cool" d="M812 476 C650 516, 350 510, 150 432"></path>

    function setupWaves() {
      if (!waveCanvas) return;
      const config = {
        lineColor: "#f9d8c0",
        waveSpeedX: 0.02,
        waveSpeedY: 0.01,
        waveAmpX: 40,
        waveAmpY: 20,
        friction: 0.9,
        tension: 0.01,
        maxCursorMove: 120,
        xGap: 12,
        yGap: 36
      };
      const ctx = waveCanvas.getContext("2d");
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      let width = 0;
      let height = 0;
      let dpr = 1;
      let time = 0;
      let rafId = 0;
      const pointer = { x: -9999, y: -9999, sx: -9999, sy: -9999 };

      function resizeWaves() {
        const rect = waveCanvas.getBoundingClientRect();
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = Math.max(1, Math.round(rect.width));
        height = Math.max(1, Math.round(rect.height));
        waveCanvas.width = Math.round(width * dpr);
        waveCanvas.height = Math.round(height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function updatePointer(event) {
        const rect = waveCanvas.getBoundingClientRect();
        pointer.x = event.clientX - rect.left;
        pointer.y = event.clientY - rect.top;
      }

      function fadePointer() {
        pointer.x = -9999;
        pointer.y = -9999;
      }

      function drawWaves() {
        ctx.clearRect(0, 0, width, height);
        ctx.lineWidth = 1;
        ctx.strokeStyle = config.lineColor;
        ctx.globalAlpha = 0.74;
        pointer.sx += (pointer.x - pointer.sx) * (1 - config.friction + config.tension);
        pointer.sy += (pointer.y - pointer.sy) * (1 - config.friction + config.tension);

        for (let y = -config.yGap; y <= height + config.yGap; y += config.yGap) {
          ctx.beginPath();
          for (let x = -config.xGap; x <= width + config.xGap; x += config.xGap) {
            const phaseX = time * config.waveSpeedX + x * 0.018;
            const phaseY = time * config.waveSpeedY + y * 0.015;
            const baseX = x + Math.sin(phaseY) * config.waveAmpX * 0.18;
            const baseY = y + Math.sin(phaseX) * config.waveAmpY;
            const dx = baseX - pointer.sx;
            const dy = baseY - pointer.sy;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const pull = Math.max(0, 1 - distance / config.maxCursorMove);
            const cursorX = pull * (dx / Math.max(distance, 1)) * config.waveAmpX * 0.42;
            const cursorY = pull * (dy / Math.max(distance, 1)) * config.waveAmpY * 0.52;
            const px = baseX + cursorX;
            const py = baseY + cursorY;
            if (x === -config.xGap) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          }
          ctx.stroke();
        }

        time += 1;
        if (!reduceMotion) rafId = window.requestAnimationFrame(drawWaves);
      }

      resizeWaves();
      window.addEventListener("pointermove", updatePointer, { passive: true });
      window.addEventListener("pointerleave", fadePointer);
      window.addEventListener("resize", resizeWaves);
      drawWaves();
    }

    function chipRow(tags = []) {

    function flattenDetailText(id) {
      return (detailLibrary[id] || []).flatMap((section) => [
        section.label,
        section.title,
        ...(section.items || []),
        section.note || ""
      ]);
    }

    function detailTabs(id) {
      const details = detailLibrary[id] || [];
      if (!details.length) return "";
      return `
        <div class="detail-tabs" data-detail-tabs="${id}">
          <div class="tab-list" role="tablist" aria-label="详细资料分类">
            ${details.map((section, index) => `
              <button class="tab-button ${index === 0 ? "is-active" : ""}" type="button" data-detail-tab="${id}-${index}" aria-selected="${index === 0 ? "true" : "false"}">
                ${section.label}
              </button>
            `).join("")}
          </div>
          ${details.map((section, index) => `
            <section class="tab-panel ${index === 0 ? "is-active" : ""}" data-detail-panel="${id}-${index}">
              <h3>${section.title}</h3>
              <ul class="detail-list">${(section.items || []).map((item) => `<li>${item}</li>`).join("")}</ul>
              ${section.note ? `<p class="detail-note">${section.note}</p>` : ""}
            </section>
          `).join("")}
        </div>
      `;
    }

    function bindDetailTabs(root = document) {
      root.querySelectorAll(".detail-tabs").forEach((group) => {
        const buttons = Array.from(group.querySelectorAll("[data-detail-tab]"));
        const panels = Array.from(group.querySelectorAll("[data-detail-panel]"));
        buttons.forEach((button) => {
          button.addEventListener("click", () => {
            const target = button.dataset.detailTab;
            buttons.forEach((item) => {
              const active = item === button;
              item.classList.toggle("is-active", active);
              item.setAttribute("aria-selected", active ? "true" : "false");
            });
            panels.forEach((panel) => {
              panel.classList.toggle("is-active", panel.dataset.detailPanel === target);
            });
          });
        });
      });
    }

    function relatedButtons(ids = []) {
      return ids.map((id) => {
        const item = entries[id] || assets.find((asset) => asset.id === id);
        if (!item) return "";
        return `<button class="related-button" type="button" data-open="${id}">${item.title}</button>`;
      }).join("");
    }

          </div>
          <aside class="side-panel">
            ${imageHtml}
            <div class="mini-card">
              <h3>继续探索</h3>
              ${relatedButtons(entry.related)}
            </div>
            <div class="mini-card">
              <h3>内容来源</h3>
              <p class="caption">依据《汉冶萍公司志》扫描 OCR、图页和人工校读整理为网页化知识模块；主界面不再以页码作为阅读入口。</p>
            </div>
          </aside>
        </div>
      `;
      modalBody.scrollTop = 0;
      bindOpenButtons(modalBody);
      bindDetailTabs(modalBody);
      modal.classList.add("is-open");
    }

    function openAsset(asset) {
      modalKicker.textContent = "图像材料";
      modalHeading.textContent = asset.title;
      modalBody.innerHTML = `
        <img class="modal-image" src="${asset.src}" alt="${asset.title}" />
        <div class="caption">${asset.caption}</div>
      `;
      modalBody.scrollTop = 0;
      modal.classList.add("is-open");
    }

    function closeModal() {
      modal.classList.remove("is-open");
    }

    function bindOpenButtons(root = document) {
      root.querySelectorAll("[data-open]").forEach((button) => {
        button.addEventListener("click", () => openEntry(button.dataset.open));
      });
    }

    function renderAssets() {
      document.getElementById("assetGrid").innerHTML = assets.map((asset) => `
        <button class="asset-button" type="button" data-open="${asset.id}">
          <span class="img-wrap">
            <img src="${asset.src}" alt="${asset.title}" loading="lazy" />
            <span class="img-overlay"></span>
          </span>
          <span>${asset.title}</span>
        </button>
      `).join("");
      bindOpenButtons(document.getElementById("assetGrid"));
    }

    function runSearch() {
      const query = searchInput.value.trim().toLowerCase();
      if (!query) {
        searchResults.classList.remove("is-open");
        searchResults.innerHTML = "";
        return;
      }
      const matches = searchable.filter((item) => item.text.toLowerCase().includes(query)).slice(0, 8);
      searchResults.classList.add("is-open");
      searchResults.innerHTML = matches.length ? matches.map((item) => `
        <button class="result-button" type="button" data-open="${item.id}">
          ${item.title}<span>点击弹出内容</span>
        </button>
      `).join("") : `<div class="empty">没有找到匹配内容，试试“焦炭”“平炉”“钢轨”“运输”。</div>`;
      bindOpenButtons(searchResults);
    }

    bindOpenButtons(document);
    renderAssets();
    setupWaves();
    searchInput.addEventListener("input", runSearch);
    document.getElementById("modalClose").addEventListener("click", closeModal);
    modal.addEventListener("click", (event) => {
      if (event.target.id === "modal") closeModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeModal();
    });

    /* ═══════════════════════════════════════════
       Scroll reveal observer
       ═══════════════════════════════════════════ */
    (function initScrollReveal() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15, rootMargin: "0px 0px -40px 0px" });

      document.querySelectorAll(".reveal").forEach((el) => observer.observe(el));
      document.querySelector(".stage-head").classList.add("reveal", "is-visible");
    })();

    /* ═══════════════════════════════════════════
       3D tilt on figure cards
       ═══════════════════════════════════════════ */
    (function initTilt() {
      const containers = document.querySelectorAll(".tilt-card");
      containers.forEach((container) => {
        container.addEventListener("mousemove", (e) => {
          const cards = container.children;
          const rect = container.getBoundingClientRect();
          const cx = e.clientX - rect.left;
          const cy = e.clientY - rect.top;
          const maxRot = 8;
          Array.from(cards).forEach((card) => {
            const cardRect = card.getBoundingClientRect();
            const cardCx = (cardRect.left + cardRect.width / 2) - rect.left;
            const cardCy = (cardRect.top + cardRect.height / 2) - rect.top;
            const dx = (cx - cardCx) / (rect.width / 2);
            const dy = (cy - cardCy) / (rect.height / 2);
            const rx = dy * maxRot;
            const ry = -dx * maxRot;
            card.style.transform = `rotateX(${rx.toFixed(2)}deg) rotateY(${ry.toFixed(2)}deg) translateZ(6px)`;
            card.style.boxShadow = `${ry * 0.5}px ${rx * 0.4}px 24px rgba(74,63,53,0.14), 0 8px 20px rgba(0,0,0,0.08)`;
          });
        });
        container.addEventListener("mouseleave", () => {
          Array.from(container.children).forEach((card) => {
            card.style.transform = "rotateX(0deg) rotateY(0deg) translateZ(0)";
            card.style.boxShadow = "";
          });
        });
      });

      /* Tilt for story buttons */
      const storyRail = document.querySelector(".story-rail");
      if (storyRail) {
        const storyBtns = storyRail.querySelectorAll(".story-button");
        storyRail.addEventListener("mousemove", (e) => {
          const rect = storyRail.getBoundingClientRect();
          const cx = e.clientX - rect.left;
          const cy = e.clientY - rect.top;
          storyBtns.forEach((btn) => {
            const br = btn.getBoundingClientRect();
            const bcx = (br.left + br.width / 2) - rect.left;
            const bcy = (br.top + br.height / 2) - rect.top;
            const dx = (cx - bcx) / (rect.width / 2);
            const dy = (cy - bcy) / (rect.height / 2);
            btn.style.transform = `rotateX(${(dy * 5).toFixed(2)}deg) rotateY(${(-dx * 5).toFixed(2)}deg) translateY(-4px)`;
            btn.style.boxShadow = `${-dx * 4}px ${dy * 3}px 24px rgba(74,63,53,0.12), 0 0 0 1px rgba(166,124,82,0.2)`;
          });
        });
        storyRail.addEventListener("mouseleave", () => {
          storyBtns.forEach((btn) => {
            btn.style.transform = "translateY(0)";
            btn.style.boxShadow = "";
          });
        });
      }
    })();

    /* ═══════════════════════════════════════════
       Spark / ember particle system
       ═══════════════════════════════════════════ */
    (function initSparks() {
      const canvas = document.getElementById("sparkCanvas");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const sparks = [];
      const MAX = 44;

      function resize() {
        const parent = canvas.parentElement;
        if (!parent) return;
        const rect = parent.getBoundingClientRect();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.round(rect.width * dpr);
        canvas.height = Math.round(rect.height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function createSpark() {
        const parent = canvas.parentElement;
        const rect = parent ? parent.getBoundingClientRect() : { width: 800, height: 560 };
        return {
          x: rect.width * 0.68 + (Math.random() - 0.5) * 220,
          y: rect.height * 0.62 + (Math.random() - 0.5) * 120,
          vx: (Math.random() - 0.5) * 1.6,
          vy: -(Math.random() * 1.8 + 0.6),
          life: 1,
          decay: Math.random() * 0.012 + 0.006,
          size: Math.random() * 3.2 + 1.2,
          hue: Math.random() > 0.5 ? 28 : 18,
          sat: "85%",
          light: Math.random() * 30 + 55
        };
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (sparks.length < MAX) sparks.push(createSpark());

        for (let i = sparks.length - 1; i >= 0; i--) {
          const s = sparks[i];
          s.x += s.vx + (Math.random() - 0.5) * 0.4;
          s.y += s.vy;
          s.vy -= 0.004;
          s.life -= s.decay;
          if (s.life <= 0) { sparks.splice(i, 1); continue; }
          const alpha = s.life * 0.82;
          const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size * 2);
          grad.addColorStop(0, `hsla(${s.hue}, ${s.sat}, ${s.light}%, ${alpha})`);
          grad.addColorStop(0.5, `hsla(${s.hue}, 90%, 58%, ${alpha * 0.5})`);
          grad.addColorStop(1, `hsla(${s.hue}, 80%, 50%, 0)`);
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size * 2, 0, Math.PI * 2);
          ctx.fill();
        }
        requestAnimationFrame(draw);
      }

      resize();
      window.addEventListener("resize", resize);
      draw();
    })();

    /* ═══════════════════════════════════════════
       Cursor glow tracking on factory map
       ═══════════════════════════════════════════ */
    (function initCursorGlow() {
      const glow = document.getElementById("cursorGlow");
      const map = document.querySelector(".factory-map");
      if (!glow || !map) return;
      map.addEventListener("mousemove", (e) => {
        const rect = map.getBoundingClientRect();
        glow.style.left = `${e.clientX - rect.left}px`;
        glow.style.top = `${e.clientY - rect.top}px`;
      });
      map.addEventListener("mouseleave", () => { glow.style.opacity = "0"; });
      map.addEventListener("mouseenter", () => { glow.style.opacity = "1"; });
    })();

    /* ═══════════════════════════════════════════
       Enhanced wave canvas — hue cycling
       ═══════════════════════════════════════════ */
    (function enhanceWaves() {
      if (!waveCanvas) return;
      const origDraw = window._waveDrawOriginal;

      const origAnim = waveCanvas._rafId;

  </script>
